name: EKS CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build-push-deploy:
    name: Build → Push → Deploy to EKS
    runs-on: ubuntu-latest
    needs: lint  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # AWS OIDC Authentication
      # ---------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github_actions
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------
      # Login to Amazon ECR
      # ---------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------
      # Build & Push Docker Image
      # ---------------------------
      - name: Build and push image
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE .
          docker push $IMAGE

      # ---------------------------
      # Update kubeconfig
      # ---------------------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      # ---------------------------
      # Deploy (IMAGE UPDATE ONLY)
      # ---------------------------
      - name: Update deployment image
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          kubectl set image deployment/thor-deployment \
            thor=$IMAGE \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/thor-deployment \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s
